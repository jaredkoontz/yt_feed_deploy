# this is used as a proxy (or edge) to ensure requests are valid to not
# choke the server.
worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log warn;

    sendfile on;
    server_tokens off;
    reset_timedout_connection on;

    client_header_timeout 5s;
    client_body_timeout 10s;
    send_timeout 15s;
    keepalive_timeout 5s;
    keepalive_requests 50;

    limit_conn_zone $binary_remote_addr zone=per_ip_conn:10m;
    limit_req_zone $binary_remote_addr zone=per_ip_req:10m rate=2r/s;

    upstream yt_feed_app {
        server yt_feed_app:8000;
        keepalive 8;
    }

    server {
        listen 80 default_server;
        server_name _;

        limit_conn per_ip_conn 8;
        limit_req zone=per_ip_req burst=20 nodelay;

        location ~* (^|/)(\.env|wp-|wordpress|phpunit|vendor/phpunit|xmlrpc\.php|phpmyadmin|cgi-bin|\.git) {
            return 444;
        }

        location /dl/ {
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 5s;
            proxy_send_timeout 30s;
            proxy_read_timeout 900s;
            proxy_pass http://yt_feed_app;
        }

        location / {
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 5s;
            proxy_send_timeout 15s;
            proxy_read_timeout 60s;
            proxy_pass http://yt_feed_app;
        }
    }
}
